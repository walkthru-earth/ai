<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>walkthru.earth — AI Urban Intelligence</title>
    <meta
      name="description"
      content="Talk to the world's data. Explore cities, climate, terrain, and population with AI-powered maps, charts, and real-time queries."
    />
    <link rel="icon" href="/favicon.png" />
    <script>
      // Theme detection — prevent FOUC (reads from walkthru-settings or legacy "theme" key)
      (function () {
        try {
          var t;
          var raw = localStorage.getItem("walkthru-settings");
          if (raw) { t = JSON.parse(raw).theme; }
          if (!t) { t = localStorage.getItem("theme"); }
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (t === "light") document.documentElement.classList.remove("dark");
          else if (t === "system" && !prefersDark) document.documentElement.classList.remove("dark");
          else if (!t && !prefersDark) document.documentElement.classList.remove("dark");
        } catch (e) {}
      })();
      // Polyfill crypto.randomUUID for older iOS/Android WebViews
      if (typeof crypto !== "undefined" && !crypto.randomUUID) {
        crypto.randomUUID = function () {
          var b = new Uint8Array(16);
          crypto.getRandomValues(b);
          b[6] = (b[6] & 0x0f) | 0x40;
          b[8] = (b[8] & 0x3f) | 0x80;
          var h = Array.prototype.map
            .call(b, function (v) {
              return ("0" + v.toString(16)).slice(-2);
            })
            .join("");
          return h.slice(0, 8) + "-" + h.slice(8, 12) + "-" + h.slice(12, 16) + "-" + h.slice(16, 20) + "-" + h.slice(20);
        };
      }
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
